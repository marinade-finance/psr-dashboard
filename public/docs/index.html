<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs | PSR Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg-dark-1: #1c1b23;
        --bg-dark-2: #2b2a34;
        --bg-dark-3: #353439;
        --bg-dark-4: #42414e;
        --text-light-1: #b8b8bc;
        --text-light-2: #fbfbfe;
        --accent: #82d9c9;
        --accent-hover: #6bc4b4;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-dark-1);
        color: var(--text-light-1);
        line-height: 1.7;
      }
      header {
        background: var(--bg-dark-1);
        padding: 0 8px;
        display: flex;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .back {
        height: 40px;
        line-height: 30px;
        padding: 5px 20px;
        background-color: var(--bg-dark-2);
        color: var(--text-light-1);
        text-decoration: none;
        margin: 4px;
        margin-right: 0;
        cursor: pointer;
        border-radius: 4px;
        font-size: inherit;
      }
      .back:hover {
        background-color: var(--bg-dark-3);
      }
      .tabs {
        display: flex;
        margin-left: auto;
      }
      .tab {
        height: 40px;
        line-height: 30px;
        padding: 5px 20px;
        border: none;
        border-radius: 4px;
        background: var(--bg-dark-3);
        color: var(--text-light-1);
        cursor: pointer;
        font-size: inherit;
        font-family: inherit;
        margin: 4px;
        margin-right: 0;
      }
      .tab:hover {
        background-color: var(--bg-dark-4);
        color: var(--text-light-2);
      }
      .tab.active {
        background-color: var(--bg-dark-4);
        color: var(--text-light-2);
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      #content {
        background: var(--bg-dark-2);
        border: 1px solid var(--bg-dark-3);
        border-radius: 8px;
        padding: 32px;
      }
      #content h1 {
        font-size: 1.5rem;
        color: var(--text-light-2);
        margin-bottom: 24px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--bg-dark-3);
      }
      #content h2 {
        font-size: 1.2rem;
        color: var(--text-light-2);
        margin: 32px 0 12px;
      }
      #content h3 {
        font-size: 1rem;
        color: var(--text-light-2);
        margin: 24px 0 8px;
      }
      #content p {
        margin-bottom: 12px;
      }
      #content code {
        font-family: 'SF Mono', Monaco, Consolas, monospace;
        background: var(--bg-dark-1);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.85em;
        color: var(--accent);
      }
      #content pre {
        background: var(--bg-dark-1);
        border: 1px solid var(--bg-dark-3);
        border-radius: 8px;
        padding: 16px;
        overflow-x: auto;
        margin: 16px 0;
      }
      #content pre code {
        background: none;
        padding: 0;
        color: var(--text-light-1);
      }
      #content ul,
      #content ol {
        margin: 12px 0 12px 24px;
      }
      #content li {
        margin: 4px 0;
      }
      #content a {
        color: var(--accent);
      }
      #content a:hover {
        color: var(--accent-hover);
      }
      #content strong {
        color: var(--text-light-2);
      }
      #content hr {
        border: none;
        border-top: 1px solid var(--bg-dark-3);
        margin: 32px 0;
      }
      #content table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
      }
      #content th,
      #content td {
        border: 1px solid var(--bg-dark-3);
        padding: 8px 12px;
        text-align: left;
      }
      #content th {
        background: var(--bg-dark-1);
        color: var(--text-light-2);
      }
      @media (max-width: 600px) {
        header {
          flex-wrap: wrap;
          gap: 12px;
        }
        main {
          padding: 20px 16px;
        }
        #content {
          padding: 20px;
        }
        .tab {
          padding: 6px 12px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a id="back" href="../" class="back">← Dashboard</a>
      <div class="tabs">
        <button class="tab active" data-doc="GUIDE.md">Guide</button>
      </div>
    </header>
    <main>
      <div id="content">loading...</div>
    </main>
    <script>
      const content = document.getElementById('content')
      const tabs = document.querySelectorAll('.tab')
      const params = new URLSearchParams(window.location.search)
      const from = params.get('from')

      if (from) {
        document.getElementById('back').href = '../' + from
      }

      function loadDoc(name) {
        content.innerHTML = 'loading...'
        fetch(name + '.md')
          .then(r => r.text())
          .then(md => { content.innerHTML = marked.parse(md) })
          .catch(() => { content.innerHTML = '<p>Error loading doc</p>' })
        params.set('doc', name)
        history.replaceState(null, '', '?' + params)
      }

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'))
          tab.classList.add('active')
          loadDoc(tab.dataset.doc.replace('.md', ''))
        })
      })

      const doc = params.get('doc')
      if (doc) {
        const tab = document.querySelector(`[data-doc="${doc}.md"]`)
        tabs.forEach(t => t.classList.remove('active'))
        if (tab) tab.classList.add('active')
      }
      loadDoc(doc || 'GUIDE')
    </script>
  </body>
</html>
