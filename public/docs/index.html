<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs | PSR Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg: #ffffff;
        --bg-subtle: #f8fafc;
        --bg-code: #f1f5f9;
        --border: #e2e8f0;
        --text: #0f172a;
        --text-secondary: #64748b;
        --accent: #1b9a8b;
        --accent-hover: #14796c;
        --header-height: 56px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f0f12;
          --bg-subtle: #16161a;
          --bg-code: #1e1e24;
          --border: #27272e;
          --text: #f1f5f9;
          --text-secondary: #94a3b8;
          --accent: #4dd9c9;
          --accent-hover: #6ee7da;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 15px;
      }

      body {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header ── */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        height: var(--header-height);
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 24px;
      }

      .header-back {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 6px;
        transition: color 0.15s, background 0.15s;
      }
      .header-back:hover {
        color: var(--text);
        background: var(--bg-subtle);
      }

      .header-divider {
        width: 1px;
        height: 18px;
        background: var(--border);
        margin: 0 4px;
      }

      .header-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin-right: auto;
      }

      .tabs {
        display: flex;
        gap: 2px;
      }

      .tab {
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px 12px;
        border-radius: 6px;
        transition: color 0.15s, background 0.15s;
      }
      .tab:hover {
        color: var(--text);
        background: var(--bg-subtle);
      }
      .tab.active {
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 10%, transparent);
      }

      /* ── Content ── */
      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      /* ── Prose ── */
      #content h1 {
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
        line-height: 1.3;
      }

      #content > :first-child + * {
        margin-top: 4px;
      }

      #content h2 {
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--text);
        margin: 40px 0 12px;
        padding-top: 40px;
        border-top: 1px solid var(--border);
      }

      #content h3 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        margin: 28px 0 8px;
      }

      #content p {
        color: var(--text-secondary);
        margin-bottom: 14px;
      }

      #content strong {
        font-weight: 600;
        color: var(--text);
      }

      #content a {
        color: var(--accent);
        text-decoration: none;
      }
      #content a:hover {
        color: var(--accent-hover);
        text-decoration: underline;
      }

      #content code {
        font-family: 'Geist Mono', 'SF Mono', Menlo, Consolas, monospace;
        font-size: 0.82em;
        background: var(--bg-code);
        color: var(--text);
        padding: 2px 5px;
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      #content pre {
        background: var(--bg-code);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 20px;
        overflow-x: auto;
        margin: 16px 0;
      }
      #content pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.875em;
        color: var(--text-secondary);
      }

      #content ul,
      #content ol {
        margin: 12px 0 12px 20px;
        color: var(--text-secondary);
      }
      #content li {
        margin: 5px 0;
      }
      #content li strong {
        color: var(--text);
      }

      #content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 36px 0;
      }

      #content blockquote {
        border-left: 3px solid var(--accent);
        margin: 16px 0;
        padding: 10px 16px;
        background: color-mix(in srgb, var(--accent) 6%, transparent);
        border-radius: 0 6px 6px 0;
      }
      #content blockquote p {
        margin: 0;
        color: var(--text);
      }

      /* ── Tables ── */
      #content table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        font-size: 0.875rem;
      }
      #content th {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
        background: var(--bg-subtle);
        padding: 10px 14px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      #content td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        color: var(--text-secondary);
        vertical-align: top;
      }
      #content td strong,
      #content td a {
        color: var(--text);
      }
      #content tr:last-child td {
        border-bottom: none;
      }

      /* Loading state */
      .loading {
        color: var(--text-secondary);
        font-size: 0.875rem;
        padding: 40px 0;
      }

      @media (max-width: 640px) {
        header {
          padding: 0 16px;
        }
        main {
          padding: 32px 16px 60px;
        }
        #content h1 {
          font-size: 1.4rem;
        }
        #content h2 {
          font-size: 1.1rem;
        }
        .header-title {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a id="back" href="../" class="header-back">← Dashboard</a>
      <div class="header-divider"></div>
      <span class="header-title">PSR Dashboard Docs</span>
      <div class="tabs">
        <button class="tab active" data-doc="GUIDE">Guide</button>
      </div>
    </header>
    <main>
      <div id="content" class="loading">Loading…</div>
    </main>
    <script>
      const content = document.getElementById('content')
      const tabs = document.querySelector('.tabs')
      const expert =
        new URLSearchParams(location.search).get('from') === 'expert'

      if (expert) {
        document.getElementById('back').href = '/expert-'
        const btn = document.createElement('button')
        btn.className = 'tab'
        btn.dataset.doc = 'GUIDE-EXPERT'
        btn.textContent = 'Expert Guide'
        tabs.appendChild(btn)
      }

      function loadDoc(name) {
        content.className = 'loading'
        content.textContent = 'Loading…'
        fetch(name + '.md')
          .then(r => r.text())
          .then(md => {
            content.className = ''
            content.innerHTML = marked.parse(md)
          })
          .catch(() => {
            content.className = ''
            content.innerHTML = '<p>Error loading doc.</p>'
          })
        history.replaceState(null, '', '#' + name)
      }

      function activateTab(doc) {
        tabs
          .querySelectorAll('.tab')
          .forEach(t => t.classList.toggle('active', t.dataset.doc === doc))
        loadDoc(doc)
      }

      tabs.addEventListener('click', e => {
        const tab = e.target.closest('.tab')
        if (tab) activateTab(tab.dataset.doc)
      })

      activateTab(location.hash.slice(1) || 'GUIDE')
    </script>
  </body>
</html>
